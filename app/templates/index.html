<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学数学口算题目生成器</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="no-print">
    <h1>小学数学口算题目生成器</h1>
  </header>

  <!-- 配置面板:打印时隐藏 -->
  <section class="panel no-print">
    <div class="config-layout">
      <div class="sidebar-container">
        <div class="sidebar-item">
          <label for="group_count">组数</label>
          <input type="number" id="group_count" value="1" min="1" max="50" />
        </div>
        <nav class="operation-tabs" aria-label="运算类型">
          <button type="button" class="operation-tab active" data-op="+" aria-selected="true">加法</button>
          <button type="button" class="operation-tab" data-op="-" aria-selected="false">减法</button>
          <button type="button" class="operation-tab" data-op="*" aria-selected="false">乘法</button>
          <button type="button" class="operation-tab" data-op="/" aria-selected="false">除法</button>
        </nav>
      </div>

      <form id="config-form">
      <!-- 算式符号预览 -->
      <div class="equation">
        <div class="slot">
          <div class="slot-box">第一个数</div>
        </div>

        <div class="slot op-slot">
          <div class="slot-box op-box" id="current-op-label">+</div>
        </div>

        <div class="slot">
          <div class="slot-box">第二个数</div>
        </div>

        <div class="slot equals">
          <div class="slot-box eq-box">=</div>
        </div>
      </div>

      <!-- 各运算的独立设置区域 -->
      <div id="carry-borrow-controls" class="advanced-controls">
        <div id="add-settings-section" class="tab-content-section">
          <div class="count-option">
            <label class="inline">加法每组数量
              <input type="number" id="add_count" value="10" min="0" max="200" />
            </label>
          </div>
          <div class="range-config">
            <div class="range-row">
              <span class="range-label">第一个数</span>
              <label>最小 <input type="number" id="add_a_min" value="0" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="add_a_max" value="20" min="0" max="10000" /></label>
            </div>
            <div class="range-row">
              <span class="range-label">第二个数</span>
              <label>最小 <input type="number" id="add_b_min" value="0" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="add_b_max" value="20" min="0" max="10000" /></label>
            </div>
          </div>
          <div id="carry-section" class="control-section hidden">
            <h3>加法进位设定</h3>
            <div id="carry-digits" class="digit-controls"></div>
          </div>
        </div>

        <div id="sub-settings-section" class="tab-content-section hidden">
          <div class="count-option">
            <label class="inline">减法每组数量
              <input type="number" id="sub_count" value="10" min="0" max="200" />
            </label>
          </div>
          <div class="range-config">
            <div class="range-row">
              <span class="range-label">第一个数</span>
              <label>最小 <input type="number" id="sub_a_min" value="0" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="sub_a_max" value="20" min="0" max="10000" /></label>
            </div>
            <div class="range-row">
              <span class="range-label">第二个数</span>
              <label>最小 <input type="number" id="sub_b_min" value="0" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="sub_b_max" value="20" min="0" max="10000" /></label>
            </div>
          </div>
          <div class="count-option">
            <label class="inline" id="no-negative-option">
              <input type="checkbox" id="no_negative" checked /> 减法避免负数结果
            </label>
          </div>
          <div id="borrow-section" class="control-section hidden">
            <h3>减法退位设定</h3>
            <div id="borrow-digits" class="digit-controls"></div>
          </div>
        </div>

        <div id="mul-settings-section" class="tab-content-section hidden">
          <div class="count-option">
            <label class="inline">乘法每组数量
              <input type="number" id="mul_count" value="0" min="0" max="200" />
            </label>
          </div>
          <div class="range-config">
            <div class="range-row">
              <span class="range-label">第一个数</span>
              <label>最小 <input type="number" id="mul_a_min" value="1" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="mul_a_max" value="9" min="0" max="10000" /></label>
            </div>
            <div class="range-row">
              <span class="range-label">第二个数</span>
              <label>最小 <input type="number" id="mul_b_min" value="1" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="mul_b_max" value="9" min="0" max="10000" /></label>
            </div>
          </div>
        </div>

        <div id="div-settings-section" class="tab-content-section hidden">
          <div class="count-option">
            <label class="inline">除法每组数量
              <input type="number" id="div_count" value="0" min="0" max="200" />
            </label>
          </div>
          <div class="range-config">
            <div class="range-row">
              <span class="range-label">第一个数</span>
              <label>最小 <input type="number" id="div_a_min" value="1" min="0" max="10000" /></label>
              <label>最大 <input type="number" id="div_a_max" value="81" min="0" max="10000" /></label>
            </div>
            <div class="range-row">
              <span class="range-label">第二个数</span>
              <label>最小 <input type="number" id="div_b_min" value="2" min="1" max="10000" /></label>
              <label>最大 <input type="number" id="div_b_max" value="9" min="1" max="10000" /></label>
            </div>
          </div>
          <div class="count-option" style="display:flex; flex-direction:column; gap:0.3rem;">
            <label class="inline">
              <input type="checkbox" id="div_no_remainder" checked /> 除法不带余数（整除）
            </label>
            <label class="inline">
              <input type="checkbox" id="div_with_remainder" /> 除法带余数
            </label>
          </div>
        </div>
      </div>


      <!-- 其它选项 -->
      <div class="options">
        <button type="submit" class="primary">生成题目</button>
        <button type="button" id="save-settings" class="secondary">保存设定</button>
      </div>
      </form>
    </div>
  </section>

  <!-- 操作工具栏 -->
  <section id="toolbar" class="toolbar no-print hidden">
    <button type="button" id="toggle-answers">显示答案</button>
    <button type="button" id="grade">在线判分</button>
    <button type="button" id="print">打印</button>
    <span id="score" class="score"></span>
  </section>

  <main>
    <!-- 分页导航栏 -->
    <nav id="pagination-controls" class="pagination no-print hidden">
      <button type="button" id="prev-page">上一页</button>
      <span id="page-indicator" class="page-indicator">第 1 页 / 共 1 页</span>
      <button type="button" id="next-page">下一页</button>
    </nav>
    <div id="problem-groups"></div>
  </main>

  <div id="message" class="message no-print"></div>

  <script src="/static/app.js"></script>
</body>
</html>
