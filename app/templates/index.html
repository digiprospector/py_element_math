<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学数学口算题目生成器</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="no-print">
    <h1>小学数学口算题目生成器</h1>
  </header>

  <!-- 配置面板:打印时隐藏 -->
  <section class="panel no-print">
    <div class="config-layout">
      <div class="sidebar-container">
        <div class="sidebar-item">
          <label for="group_count">组数</label>
          <input type="number" id="group_count" value="1" min="1" max="50" />
        </div>
        <nav class="operation-tabs" aria-label="运算类型">
          <button type="button" class="operation-tab active" data-op="+" aria-selected="true">加法</button>
          <button type="button" class="operation-tab" data-op="-" aria-selected="false">减法</button>
        </nav>
      </div>

      <form id="config-form">
      <!-- 算式模板:第一个数 / 运算符 / 第二个数 各自设定 -->
      <div class="equation">
        <div class="slot">
          <div class="slot-box">第一个数</div>
          <div class="slot-config">
            <label>最小 <input type="number" id="a_min" value="0" min="0" max="10000" /></label>
            <label>最大 <input type="number" id="a_max" value="20" min="0" max="10000" /></label>
          </div>
        </div>

        <div class="slot op-slot">
          <div class="slot-box op-box" id="current-op-label">+ / −</div>
        </div>

        <div class="slot">
          <div class="slot-box">第二个数</div>
          <div class="slot-config">
            <label>最小 <input type="number" id="b_min" value="0" min="0" max="10000" /></label>
            <label>最大 <input type="number" id="b_max" value="20" min="0" max="10000" /></label>
          </div>
        </div>

        <div class="slot equals">
          <div class="slot-box eq-box">=</div>
        </div>
      </div>

      <!-- 进位/退位控制与数量设置:根据选项卡切换显示 -->
      <div id="carry-borrow-controls" class="advanced-controls">
        <div id="add-settings-section" class="tab-content-section">
          <div class="count-option">
            <label class="inline">加法每组数量
              <input type="number" id="add_count" value="10" min="0" max="200" />
            </label>
          </div>
          <div id="carry-section" class="control-section hidden">
            <h3>加法进位设定</h3>
            <div id="carry-digits" class="digit-controls"></div>
          </div>
        </div>

        <div id="sub-settings-section" class="tab-content-section hidden">
          <div class="count-option">
            <label class="inline">减法每组数量
              <input type="number" id="sub_count" value="10" min="0" max="200" />
            </label>
          </div>
          <div class="count-option">
            <label class="inline" id="no-negative-option">
              <input type="checkbox" id="no_negative" checked /> 减法避免负数结果
            </label>
          </div>
          <div id="borrow-section" class="control-section hidden">
            <h3>减法退位设定</h3>
            <div id="borrow-digits" class="digit-controls"></div>
          </div>
        </div>
      </div>


      <!-- 其它选项 -->
      <div class="options">
        <button type="submit" class="primary">生成题目</button>
        <button type="button" id="save-settings" class="secondary">保存设定</button>
      </div>
      </form>
    </div>
  </section>

  <!-- 操作工具栏 -->
  <section id="toolbar" class="toolbar no-print hidden">
    <button type="button" id="toggle-answers">显示答案</button>
    <button type="button" id="grade">在线判分</button>
    <button type="button" id="print">打印</button>
    <span id="score" class="score"></span>
  </section>

  <main>
    <div id="problem-groups"></div>
  </main>

  <div id="message" class="message no-print"></div>

  <script src="/static/app.js"></script>
</body>
</html>
